<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Dopamine Rush - Reflex Challenge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        
        #gameContainer {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
        }
        
        h1 {
            color: #fff;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        #score, #highScore, #combo {
            color: #fff;
            font-size: 1.5em;
            margin: 10px 0;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }
        
        #combo {
            font-size: 2em;
            color: #FFD700;
            font-weight: bold;
            animation: pulse 0.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        #gameArea {
            width: 100%;
            height: 400px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        
        .target {
            position: absolute;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.1s;
            animation: appear 0.3s ease-out;
            box-shadow: 0 0 20px rgba(245, 87, 108, 0.8);
        }
        
        .target:hover {
            transform: scale(1.1);
        }
        
        @keyframes appear {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .explosion {
            position: absolute;
            font-size: 2em;
            animation: explode 0.5s ease-out forwards;
            pointer-events: none;
        }
        
        @keyframes explode {
            from {
                transform: scale(0) rotate(0deg);
                opacity: 1;
            }
            to {
                transform: scale(2) rotate(360deg);
                opacity: 0;
            }
        }
        
        #startBtn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 1.5em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(245, 87, 108, 0.4);
            font-weight: bold;
        }
        
        #startBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(245, 87, 108, 0.6);
        }
        
        #startBtn:active {
            transform: translateY(0);
        }
        
        .hidden {
            display: none;
        }
        
        #timer {
            color: #FFD700;
            font-size: 2em;
            font-weight: bold;
            margin: 10px 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .message {
            color: #fff;
            font-size: 1.2em;
            margin: 15px 0;
            animation: fadeIn 0.5s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <h1>🔥 Dopamine Rush</h1>
        <div id="score">Score: <span id="scoreValue">0</span></div>
        <div id="highScore">High Score: <span id="highScoreValue">0</span></div>
        <div id="combo" class="hidden">COMBO x<span id="comboValue">0</span>!</div>
        <div id="timer" class="hidden">Time: <span id="timeValue">30</span>s</div>
        <div id="gameArea" class="hidden"></div>
        <button id="startBtn">START GAME</button>
        <div id="message" class="message hidden"></div>
    </div>

    <script>
        let score = 0;
        let highScore = localStorage.getItem('highScore') || 0;
        let combo = 0;
        let gameActive = false;
        let targetCount = 0;
        let timeLeft = 30;
        let timerInterval;
        let spawnInterval;
        
        const scoreEl = document.getElementById('scoreValue');
        const highScoreEl = document.getElementById('highScoreValue');
        const comboEl = document.getElementById('comboValue');
        const comboContainer = document.getElementById('combo');
        const gameArea = document.getElementById('gameArea');
        const startBtn = document.getElementById('startBtn');
        const timerEl = document.getElementById('timeValue');
        const timerContainer = document.getElementById('timer');
        const messageEl = document.getElementById('message');
        
        highScoreEl.textContent = highScore;
        
        function startGame() {
            score = 0;
            combo = 0;
            timeLeft = 30;
            gameActive = true;
            targetCount = 0;
            
            scoreEl.textContent = score;
            comboEl.textContent = combo;
            comboContainer.classList.add('hidden');
            messageEl.classList.add('hidden');
            
            gameArea.classList.remove('hidden');
            timerContainer.classList.remove('hidden');
            startBtn.classList.add('hidden');
            gameArea.innerHTML = '';
            
            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.textContent = timeLeft;
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
            
            spawnTarget();
            spawnInterval = setInterval(spawnTarget, 800 - Math.min(score * 10, 500));
        }
        
        function spawnTarget() {
            if (!gameActive || targetCount >= 5) return;
            
            targetCount++;
            const target = document.createElement('div');
            target.className = 'target';
            
            const maxX = gameArea.clientWidth - 60;
            const maxY = gameArea.clientHeight - 60;
            
            target.style.left = Math.random() * maxX + 'px';
            target.style.top = Math.random() * maxY + 'px';
            
            target.addEventListener('click', (e) => {
                e.stopPropagation();
                hitTarget(target);
            });
            
            gameArea.appendChild(target);
            
            setTimeout(() => {
                if (gameArea.contains(target)) {
                    target.remove();
                    targetCount--;
                    combo = 0;
                    comboContainer.classList.add('hidden');
                }
            }, 2000);
        }
        
        function hitTarget(target) {
            if (!gameActive) return;
            
            const rect = target.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            
            createExplosion(x, y);
            
            combo++;
            const points = 10 * combo;
            score += points;
            scoreEl.textContent = score;
            
            if (combo > 1) {
                comboEl.textContent = combo;
                comboContainer.classList.remove('hidden');
            }
            
            target.remove();
            targetCount--;
            
            if (score > highScore) {
                highScore = score;
                highScoreEl.textContent = highScore;
                localStorage.setItem('highScore', highScore);
            }
            
            clearInterval(spawnInterval);
            spawnInterval = setInterval(spawnTarget, Math.max(400, 800 - score * 5));
        }
        
        function createExplosion(x, y) {
            const explosion = document.createElement('div');
            explosion.className = 'explosion';
            explosion.textContent = '💥';
            explosion.style.left = x + 'px';
            explosion.style.top = y + 'px';
            document.body.appendChild(explosion);
            
            setTimeout(() => explosion.remove(), 500);
        }
        
        function endGame() {
            gameActive = false;
            clearInterval(timerInterval);
            clearInterval(spawnInterval);
            
            gameArea.classList.add('hidden');
            timerContainer.classList.add('hidden');
            startBtn.classList.remove('hidden');
            comboContainer.classList.add('hidden');
            
            let message = '';
            if (score >= 500) {
                message = '🏆 INSANE! You\'re a legend!';
            } else if (score >= 300) {
                message = '🔥 AMAZING! Incredible reflexes!';
            } else if (score >= 150) {
                message = '✨ GREAT! Keep it up!';
            } else if (score >= 50) {
                message = '👍 Good job! Try again?';
            } else {
                message = '😅 Nice try! You can do better!';
            }
            
            messageEl.textContent = message + ` Final Score: ${score}`;
            messageEl.classList.remove('hidden');
        }
        
        gameArea.addEventListener('click', (e) => {
            if (e.target === gameArea && gameActive) {
                combo = 0;
                comboContainer.classList.add('hidden');
            }
        });
        
        startBtn.addEventListener('click', startGame);
    </script>
</body>
</html>
